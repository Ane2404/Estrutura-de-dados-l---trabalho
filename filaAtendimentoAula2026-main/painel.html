<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="model/Atendimento.js"></script>
    
</head>
<style>
    div {
        padding: 5px;
	    background-color: #c3eee0;
	    border-radius: 5px;
	    margin-bottom: 5px;
	    font-size: x-large;
	    color: white;
    }
    .title{
        list-style: none;
	    padding: 0;
	    margin-top: 20px;
        text-align: center;
        width: 50%; /* Ou qualquer largura fixa */
        margin: 0 auto; /* 0 em cima/baixo, auto nas laterais */
        color: #000;
    }
    .subTitle{
        text-align: center;
        width: 50%; /* Ou qualquer largura fixa */
        margin: 0 auto; /* 0 em cima/baixo, auto nas laterais */
        color: #0cd127;
    }
</style>
<body>
    <div id="utilmoAtendimento">
        <h2 class="title">Ultimo Atendimento</h2>
        <p class="subTitle">Aguardando...</p>

    </div>

    <script>
    function atualizarUltimoAtendimento(){
        const ultimoA = document.getElementById('ultimoAtendimento');
        const ultimoA2 = localStorage.getItem('utilmoAtendimento');

        if (ultimoA2 !== null){
            ultimoA.textContent = JSON.stringify(ultimoA2);
            return ;
        }
        ultimoA.textContent = 'Aguardando...';
    }

    atualizarUltimoAtendimento();
    setInterval (atualizarUltimoAtendimento, 1000);
    </script>


</body>
</html>
